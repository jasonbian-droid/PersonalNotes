<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Null % Time-Series — INBOUND_INTERACTION_EVENTS</title>
  <link rel="stylesheet" href="src/nav.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 48px 24px 72px; }
    h1 { text-align: center; font-size: 1.1rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .subtitle { text-align: center; font-size: 0.78rem; color: #475569; margin-bottom: 32px; }
    .content { max-width: 860px; margin: 0 auto; }
    .chart-controls { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; align-items: flex-end; }
    .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-group label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; }
    .ctrl-group select { background: #1e2330; color: #e2e8f0; border: 1px solid #2d3448; border-radius: 6px; padding: 6px 10px; font-size: 0.85rem; min-width: 150px; cursor: pointer; }
    .ctrl-group select:focus { outline: none; border-color: #4a5568; }
    .chart-wrap { background: #1e2330; border: 1px solid #2d3448; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .chart-wrap canvas { width: 100% !important; }
    #no-data { text-align: center; color: #94a3b8; padding: 40px; display: none; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="index.html">Pipeline</a>
    <span class="nav-sep">·</span>
    <a href="email-flow.html">Email Flow</a>
    <span class="nav-sep">·</span>
    <a href="event-api-actions.html">Action Models</a>
    <span class="nav-sep">·</span>
    <a href="null-timeseries.html" class="active">Null %</a>
  </nav>

  <h1>Null % Time-Series</h1>
  <p class="subtitle">Daily null rate per column in INBOUND_INTERACTION_EVENTS, segmented by BUILDING_ID and ORG_ID</p>

  <div class="content">
    <div class="chart-controls">
      <div class="ctrl-group">
        <label>Building</label>
        <select id="sel-building"><option value="">All buildings</option></select>
      </div>
      <div class="ctrl-group">
        <label>Org</label>
        <select id="sel-org"><option value="">All orgs</option></select>
      </div>
      <div class="ctrl-group">
        <label>Column</label>
        <select id="sel-col"><option value="">All columns</option></select>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="null-chart" height="380"></canvas>
      <div id="no-data">No data for this combination.</div>
    </div>
    <div class="chart-wrap">
      <canvas id="volume-chart" height="180"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script>
(async () => {
  const res = await fetch('data/null-timeseries.json');
  const db  = await res.json();

  const PALETTE = ['#60a5fa','#34d399','#f59e0b','#f87171','#a78bfa','#fb923c','#38bdf8','#4ade80'];

  const selBld = document.getElementById('sel-building');
  const selOrg = document.getElementById('sel-org');
  const selCol = document.getElementById('sel-col');

  db.buildings.forEach(b => selBld.insertAdjacentHTML('beforeend', `<option value="${b}">${b}</option>`));
  db.orgs.forEach(o => selOrg.insertAdjacentHTML('beforeend', `<option value="${o}">${o}</option>`));
  db.columns.forEach(c => selCol.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`));

  function filtered() {
    const bld = selBld.value, org = selOrg.value;
    return db.data.filter(r => (!bld || r.building_id === bld) && (!org || r.org_id === org));
  }

  function aggregate(rows) {
    const byDay = {};
    rows.forEach(r => {
      if (!byDay[r.day]) byDay[r.day] = { total_rows: 0, counts: {}, n: 0 };
      const d = byDay[r.day];
      d.total_rows += r.total_rows;
      d.n += 1;
      db.columns.forEach(c => { d.counts[c] = (d.counts[c] || 0) + r[c.toLowerCase() + '_null_pct']; });
    });
    return Object.entries(byDay).sort(([a],[b]) => a.localeCompare(b)).map(([day, d]) => ({
      day, total_rows: d.total_rows,
      ...Object.fromEntries(db.columns.map(c => [c, +(d.counts[c] / d.n).toFixed(2)])),
    }));
  }

  const commonScales = {
    x: { type: 'time', time: { unit: 'day', tooltipFormat: 'MMM d' }, grid: { color: '#2d3448' }, ticks: { color: '#64748b' } },
  };
  const tooltipDefaults = { backgroundColor: '#1e2330', borderColor: '#2d3448', borderWidth: 1, titleColor: '#e2e8f0', bodyColor: '#94a3b8' };

  const nullChart = new Chart(document.getElementById('null-chart').getContext('2d'), {
    type: 'line', data: { datasets: [] },
    options: {
      responsive: true, animation: false, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } }, tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%` } } },
      scales: { ...commonScales, y: { min: 0, max: 100, grid: { color: '#2d3448' }, ticks: { color: '#64748b', callback: v => v + '%' }, title: { display: true, text: 'Null %', color: '#64748b' } } },
    },
  });

  const volumeChart = new Chart(document.getElementById('volume-chart').getContext('2d'), {
    type: 'bar', data: { datasets: [] },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false }, tooltip: { ...tooltipDefaults, callbacks: { label: ctx => ` Rows: ${ctx.parsed.y.toLocaleString()}` } } },
      scales: { ...commonScales, y: { grid: { color: '#2d3448' }, ticks: { color: '#64748b' }, title: { display: true, text: 'Row count', color: '#64748b' } } },
    },
  });

  function render() {
    const agg = aggregate(filtered());
    const noData = document.getElementById('no-data');
    if (!agg.length) { noData.style.display = 'block'; nullChart.data.datasets = []; nullChart.update(); return; }
    noData.style.display = 'none';
    const colFilter = selCol.value ? [selCol.value] : db.columns;
    nullChart.data.datasets = colFilter.map((col, i) => ({
      label: col, data: agg.map(r => ({ x: r.day, y: r[col] })),
      borderColor: PALETTE[i % PALETTE.length], backgroundColor: PALETTE[i % PALETTE.length] + '22',
      borderWidth: 2, pointRadius: 2, tension: 0.3, fill: false,
    }));
    nullChart.update();
    volumeChart.data.datasets = [{ label: 'Rows', data: agg.map(r => ({ x: r.day, y: r.total_rows })), backgroundColor: '#3b82f633', borderColor: '#3b82f6', borderWidth: 1 }];
    volumeChart.update();
  }

  [selBld, selOrg, selCol].forEach(s => s.addEventListener('change', render));
  render();
})();
  </script>
</body>
</html>
